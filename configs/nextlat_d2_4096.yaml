# NextLat d=2 - Matches hyperparameters of d=1 and retrained GPT
vocab_size: 4096
hidden_size: 384
num_layers: 6
num_heads: 6
max_seq_len: 256
dropout: 0.1

batch_size: 8
grad_accum_steps: 8
learning_rate: 0.00025
weight_decay: 0.05
warmup_steps: 3000
max_steps: 30000
eval_interval: 1000
save_interval: 5000
log_interval: 50

# NextLat specific
d: 2                           # Multi-step horizon = 2
next_h_lambda: 0.2             # Same as d=1 run
kl_lambda: 0.05                # Same as d=1 run
latent_mlp_dim: 768
latent_mlp_layers: 3